<?xml version="1.0" encoding="UTF-8"?>
<!--
  AgentQuad logo · 4-lane status board edition
  "Quad" 现在指 4 状态列：待办 / 运行中 / 需确认 / 已空闲
  四列顶部 accent 色一字排开，每列里有一张代表 session 的小卡片
-->
<svg width="256" height="256" viewBox="0 0 256 256"
     xmlns="http://www.w3.org/2000/svg"
     fill="none"
     role="img"
     aria-label="AgentQuad">

  <!-- 圆角背景：深紫渐变（保留品牌色调） -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#1a1233"/>
      <stop offset="100%" stop-color="#2c1b52"/>
    </linearGradient>
    <linearGradient id="laneGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- ===== 4 条 status lane ===== -->
  <!-- 每条 lane: 顶部 8px 实色 accent + 玻璃质感主体 + 中间一张卡片 -->

  <!-- Lane 1 · Backlog (gray) -->
  <g transform="translate(44 60)">
    <rect width="36" height="148" rx="8" fill="url(#laneGlass)"/>
    <rect width="36" height="8"  rx="3" fill="#8a93a5"/>
    <rect x="6" y="22" width="24" height="14" rx="3" fill="#ffffff" opacity="0.65"/>
  </g>

  <!-- Lane 2 · In Progress (green) -->
  <g transform="translate(92 60)">
    <rect width="36" height="148" rx="8" fill="url(#laneGlass)"/>
    <rect width="36" height="8"  rx="3" fill="#4ade80"/>
    <rect x="6" y="22" width="24" height="14" rx="3" fill="#ffffff" opacity="0.85"/>
    <!-- 运行中的"脉冲点"在右上角 -->
    <circle cx="30" cy="4" r="3" fill="#4ade80">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Lane 3 · Needs Input (orange) -->
  <g transform="translate(140 60)">
    <rect width="36" height="148" rx="8" fill="url(#laneGlass)"/>
    <rect width="36" height="8"  rx="3" fill="#f97316"/>
    <rect x="6" y="22" width="24" height="14" rx="3" fill="#ffffff" opacity="0.85"/>
    <!-- 需确认标志：右下三角小箭头 -->
    <path d="M27 30 L31 26 L31 34 Z" fill="#f97316" opacity="0.9"/>
  </g>

  <!-- Lane 4 · Idle (yellow) -->
  <g transform="translate(188 60)">
    <rect width="36" height="148" rx="8" fill="url(#laneGlass)"/>
    <rect width="36" height="8"  rx="3" fill="#facc15"/>
    <rect x="6" y="22" width="24" height="14" rx="3" fill="#ffffff" opacity="0.55"/>
  </g>

</svg>
